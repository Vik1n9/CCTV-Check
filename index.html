<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#161b22">
  <title>CCTV 點檢系統 | 動態主機 + 報表導入 (支援主機修復)</title>
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2330;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --primary:   #1f6feb;
      --normal:    #2ea043;
      --fault:     #da3633;
      --abnormal:  #e67e22;
      --removed:   #6e7681;
      --radius:    16px;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html { overflow-x: hidden; overscroll-behavior: none; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(80px + var(--safe-bottom) + 8px);
      overflow-x: hidden;
      overscroll-behavior-y: contain;
    }

    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; padding-top: max(12px, var(--safe-top)); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
    .header-logo { font-size: 1rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .header-logo .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--fault); animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
    .header-date { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); }
    .tab-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: calc(44px + max(12px, var(--safe-top))); z-index: 99; }
    .tab { flex: 1; text-align: center; height: 48px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; cursor: pointer; color: var(--muted); border-bottom: 2.5px solid transparent; transition: all .2s; user-select: none; }
    .tab.active { color: var(--primary); border-color: var(--primary); }
    .content { padding: 12px 12px 0; max-width: 820px; margin: 0 auto; }
    .host-nav { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; }
    .host-nav-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .nav-btn { width: 48px; height: 48px; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, transform .1s; touch-action: manipulation; }
    .nav-btn:active { background: var(--border); transform: scale(0.9); }
    .host-info { flex: 1; text-align: center; }
    .host-name { font-size: clamp(1.3rem, 6vw, 1.7rem); font-weight: 800; font-family: 'JetBrains Mono', monospace; }
    .host-meta { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
    .host-dots { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; padding: 4px 0; }
    .host-dot { width: 10px; height: 10px; border-radius: 5px; background: var(--border); cursor: pointer; transition: all .15s; padding: 8px; background-clip: content-box; margin: -8px; position: relative; }
    .host-dot.current { width: 24px; padding: 8px; border-radius: 12px; background: var(--primary); }
    .host-dot.has-fault { background: var(--fault); }
    .host-dot.has-abnormal:not(.has-fault) { background: var(--abnormal); }
    .host-dot.removed { background: var(--removed); cursor: default; opacity: 0.5; }
    .host-dot.all-ok { background: var(--normal); }
    .stats-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 6px; text-align: center; }
    .stat-num { font-size: clamp(1.4rem, 5vw, 1.9rem); font-weight: 800; font-family: 'JetBrains Mono', monospace; }
    .stat-label { font-size: clamp(0.62rem, 2.2vw, 0.7rem); color: var(--muted); margin-top: 4px; }
    .filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .filter-btn { flex: 1; min-width: 60px; height: 42px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font-size: 0.78rem; font-weight: 600; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
    .filter-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(31,111,235,.12); }
    .legend { display: flex; gap: 12px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .swipe-hint { text-align: center; font-size: 0.65rem; color: var(--border); margin-bottom: 6px; }
    .ch-grid { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 10px; min-height: 180px; user-select: none; }
    .grid-normal { display: grid; grid-template-columns: repeat(auto-fill, minmax(54px, 1fr)); gap: 6px; }
    .ch-card { aspect-ratio: 1; min-height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: clamp(0.75rem, 2.8vw, 0.92rem); font-family: 'JetBrains Mono', monospace; color: white; cursor: pointer; transition: transform .08s; position: relative; }
    .ch-card[data-state="0"] { background: var(--normal); }
    .ch-card[data-state="1"] { background: var(--fault); }
    .ch-card[data-state="2"] { background: var(--abnormal); }
    .ch-card.hidden { display: none; }
    .ch-card:active { transform: scale(0.84); }
    .removed-message { text-align: center; padding: 40px 20px; color: var(--muted); background: var(--surface2); border-radius: 12px; border: 1px dashed var(--border); }
    .section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 8px; }
    .quick-row { display: flex; gap: 7px; margin-bottom: 8px; flex-wrap: wrap; }
    .btn { flex: 1; padding: 13px 8px; border-radius: 12px; border: 1px solid var(--border); font-weight: 600; font-size: 0.82rem; cursor: pointer; transition: all .15s; text-align: center; min-height: 46px; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-normal { background: rgba(46,160,67,.15); color: #3fb950; border-color: rgba(46,160,67,.3); }
    .btn-fault { background: rgba(218,54,51,.15); color: #f85149; border-color: rgba(218,54,51,.3); }
    .btn-abnormal { background: rgba(230,126,34,.15); color: #f0a65a; border-color: rgba(230,126,34,.3); }
    .btn-ghost { background: var(--surface2); color: var(--text); border-color: var(--border); }
    .btn-danger { background: rgba(218,54,51,.1); color: #f85149; border-color: rgba(218,54,51,.3); }
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 8px 12px; padding-bottom: max(8px, var(--safe-bottom)); display: flex; gap: 8px; z-index: 100; }
    .bottom-bar .btn { flex: 1; padding: 12px 6px; font-size: 0.82rem; min-height: 46px; white-space: normal; }
    .overview-summary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
    .overview-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
    .overview-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; cursor: pointer; min-height: 80px; transition: transform .15s; touch-action: manipulation; }
    .overview-card:active { transform: scale(0.96); }
    .ov-host-name { font-family: 'JetBrains Mono', monospace; font-size: 0.92rem; font-weight: 700; margin-bottom: 6px; }
    .ov-bar { height: 5px; border-radius: 3px; overflow: hidden; background: var(--border); display: flex; margin-bottom: 6px; }
    .ov-counts { display: flex; gap: 8px; font-size: 0.7rem; color: var(--muted); align-items: center; }
    .toast { position: fixed; bottom: calc(max(8px, var(--safe-bottom)) + 62px + 16px); left: 50%; transform: translateX(-50%) translateY(12px); background: var(--text); color: var(--bg); padding: 10px 22px; border-radius: 30px; font-size: 0.84rem; font-weight: 600; opacity: 0; transition: all .25s; z-index: 999; white-space: nowrap; pointer-events: none; max-width: calc(100vw - 32px); text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (min-width: 480px) { .overview-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 600px) { .overview-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-height: 500px) and (orientation: landscape) { body { padding-bottom: calc(64px + var(--safe-bottom)); } .bottom-bar .btn { min-height: 40px; } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo"><div class="dot"></div>CCTV 點檢系統</div>
  <div class="header-date" id="headerDate"></div>
</div>
<div class="tab-bar">
  <div class="tab active" data-tab="inspection">🔍 點檢</div>
  <div class="tab" data-tab="overview">📊 總覽</div>
</div>
<div class="toast" id="toast"></div>

<div id="pane-inspection" class="content">
  <div class="host-nav">
    <div class="host-nav-row">
      <button class="nav-btn" id="btnPrev">◀</button>
      <div class="host-info"><div class="host-name" id="hostName">--</div><div class="host-meta" id="hostMeta">--</div></div>
      <button class="nav-btn" id="btnNext">▶</button>
    </div>
    <div class="host-dots" id="hostDots"></div>
  </div>
  <div class="stats-strip">
    <div class="stat-card s-normal"><div class="stat-num" id="statNormal">--</div><div class="stat-label">🟢 正常</div></div>
    <div class="stat-card s-fault"><div class="stat-num" id="statFault">--</div><div class="stat-label">🔴 故障</div></div>
    <div class="stat-card s-abnormal"><div class="stat-num" id="statAbnormal">--</div><div class="stat-label">⚠️ 異常</div></div>
  </div>
  <div class="filter-row" role="group">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="fault">故障</button>
    <button class="filter-btn" data-filter="abnormal">異常</button>
    <button class="filter-btn" data-filter="normal">正常</button>
  </div>
  <div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--normal)"></div>正常</div><div class="legend-item"><div class="legend-dot" style="background:var(--fault)"></div>故障</div><div class="legend-item"><div class="legend-dot" style="background:var(--abnormal)"></div>異常</div></div>
  <div class="swipe-hint">← 左右滑動換主機 →　　點擊迴路循環切換</div>
  <div id="chGrid" class="ch-grid"></div>
  <div class="section-label">快速全設</div>
  <div class="quick-row">
    <button class="btn btn-normal" id="qaAllNormal">✅ 全正常</button>
    <button class="btn btn-fault" id="qaAllFault">❌ 全故障</button>
    <button class="btn btn-abnormal" id="qaAllAbnormal">⚠️ 全異常</button>
  </div>
  <div class="section-label">重置操作</div>
  <div class="quick-row" style="margin-bottom: 16px">
    <button class="btn btn-ghost" id="btnResetCurrent">🔄 重置當前主機</button>
    <button class="btn btn-danger" id="btnResetAll">⚠️ 重置全部</button>
  </div>
</div>

<div id="pane-overview" class="content" style="display:none">
  <div class="overview-summary" id="overviewSummary"></div>
  <div class="overview-grid" id="overviewGrid"></div>
</div>

<div class="bottom-bar">
  <button class="btn btn-ghost" id="btnImportReport">📂 導入報表</button>
  <button class="btn btn-primary" id="btnExportFull">📥 主機報表<br><span style="font-size:.72em;">Excel 格式</span></button>
</div>

<script>
  // ------------------------------ 預設主機結構 ------------------------------
  const DEFAULT_HOSTS = [
    { id: "A",  channels: 31, removed: false }, { id: "B",  channels: 32, removed: false }, { id: "C",  channels: 32, removed: false },
    { id: "D",  channels: 24, removed: false }, { id: "E",  channels: 32, removed: false }, { id: "F",  channels: 18, removed: false },
    { id: "G",  channels: 0,  removed: true  }, { id: "H",  channels: 0,  removed: true  }, { id: "I",  channels: 0,  removed: true  },
    { id: "J",  channels: 32, removed: false }, { id: "K1", channels: 20, removed: false }, { id: "K2", channels: 18, removed: false },
    { id: "L",  channels: 39, removed: false }, { id: "M",  channels: 59, removed: false }, { id: "N",  channels: 52, removed: false },
    { id: "O",  channels: 51, removed: false }, { id: "P",  channels: 40, removed: false }, { id: "Q1", channels: 16, removed: false },
    { id: "Q2", channels: 25, removed: false }, { id: "R",  channels: 49, removed: false }, { id: "S",  channels: 12, removed: false }
  ];

  let HOSTS = [];          // 動態主機陣列
  let state = {};          // { hostId: { channel: 0/1/2 } }
  let curIdx = 0;
  let curFilter = 'all';
  let currentTab = 'inspection';

  const STORAGE_KEY = 'cctv_dynamic_v5';

  // 輔助函式
  function haptic(ms = 8) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch(_) {} }
  function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2800); }

  // 統計某主機
  function hostStats(host) {
    const s = state[host.id] || {};
    let normal = 0, fault = 0, abnormal = 0;
    for (let ch = 1; ch <= host.channels; ch++) {
      const v = s[ch] ?? 0;
      if (v === 0) normal++;
      else if (v === 1) fault++;
      else abnormal++;
    }
    return { normal, fault, abnormal, total: host.channels };
  }

  function getFaultChannels(hostId) { return getChannelsByState(hostId, 1); }
  function getAbnormalChannels(hostId) { return getChannelsByState(hostId, 2); }
  function getChannelsByState(hostId, targetState) {
    const host = HOSTS.find(h => h.id === hostId);
    if (!host || host.removed || host.channels === 0) return [];
    const hostState = state[hostId] || {};
    const list = [];
    for (let ch = 1; ch <= host.channels; ch++) if ((hostState[ch] ?? 0) === targetState) list.push(ch);
    return list;
  }

  // 儲存完整資料 (主機列表 + 狀態)
  function saveFull() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ hosts: HOSTS, state: state }));
  }

  // 初始化狀態 (依照目前 HOSTS 重置所有通道為正常)
  function initStateFromHosts() {
    const newState = {};
    for (const h of HOSTS) {
      newState[h.id] = {};
      if (!h.removed && h.channels > 0) {
        for (let ch = 1; ch <= h.channels; ch++) newState[h.id][ch] = 0;
      }
    }
    state = newState;
    saveFull();
  }

  // 載入儲存資料
  function loadFull() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      HOSTS = JSON.parse(JSON.stringify(DEFAULT_HOSTS));
      initStateFromHosts();
      return;
    }
    try {
      const data = JSON.parse(raw);
      if (data.hosts && Array.isArray(data.hosts) && data.state) {
        HOSTS = data.hosts;
        state = data.state;
        // 確保每個主機的通道數目與 state 一致 (補缺)
        for (const h of HOSTS) {
          if (!state[h.id]) state[h.id] = {};
          if (!h.removed && h.channels > 0) {
            for (let ch = 1; ch <= h.channels; ch++) if (state[h.id][ch] === undefined) state[h.id][ch] = 0;
          }
        }
      } else {
        // 舊版僅有 state 物件, 用預設 HOSTS
        HOSTS = JSON.parse(JSON.stringify(DEFAULT_HOSTS));
        const oldState = data;
        state = {};
        for (const h of HOSTS) {
          state[h.id] = {};
          for (let ch = 1; ch <= h.channels; ch++) {
            const oldVal = oldState?.[h.id]?.[ch];
            state[h.id][ch] = (oldVal !== undefined && [0,1,2].includes(oldVal)) ? oldVal : 0;
          }
        }
        saveFull();
      }
    } catch(e) { HOSTS = JSON.parse(JSON.stringify(DEFAULT_HOSTS)); initStateFromHosts(); }
    if (curIdx >= HOSTS.length) curIdx = 0;
  }

  // 導入報表 CSV (完全取代主機配置與點檢狀態)
  function importFromCSV(csvText) {
    const lines = csvText.replace(/^\uFEFF/, '').split(/\r?\n/).filter(l => l.trim().length > 0);
    if (lines.length < 2) throw new Error('檔案內容不足');
    const header = lines[0];
    if (!header.includes('主機') || !header.includes('CH總數')) throw new Error('CSV 格式不符，請使用系統導出的主機報表');
    
    const newHostsMap = new Map(); // id -> { channels, faultList, abnormalList }
    for (let i = 1; i < lines.length; i++) {
      const row = parseCSVRow(lines[i]);
      if (row.length < 6) continue;
      const hostId = row[0].trim();
      if (!hostId) continue;
      // 跳過總結行 (全場總計)
      if (hostId === '全場總計' || hostId.includes('總計')) continue;
      
      const totalCh = parseInt(row[1], 10);
      if (isNaN(totalCh)) continue; // 無效通道數則跳過
      const channels = totalCh < 0 ? 0 : totalCh;
      const faultStr = row[2].trim();
      const remark = row[5] || '';
      
      // 解析故障列表
      const faultList = faultStr ? faultStr.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n > 0) : [];
      // 解析異常通道 (從備註擷取 "異常通道: 數字,數字")
      let abnormalList = [];
      const abnormalMatch = remark.match(/異常通道:\s*([\d,]+)/);
      if (abnormalMatch) {
        abnormalList = abnormalMatch[1].split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n > 0);
      }
      
      // ★ 關鍵：只要 CH總數 > 0，主機就視為存在（非拆除），完全忽略備註中的拆除字眼
      // 若 CH總數 === 0 則視為拆除主機
      const isRemoved = (channels === 0);
      
      newHostsMap.set(hostId, { channels, removed: isRemoved, faultList, abnormalList });
    }
    
    if (newHostsMap.size === 0) throw new Error('未解析到任何主機資料');
    
    // 建立新主機陣列
    const newHosts = [];
    for (let [id, cfg] of newHostsMap.entries()) {
      newHosts.push({ id, channels: cfg.channels, removed: cfg.removed });
    }
    
    // 建立新 state
    const newState = {};
    for (let [id, cfg] of newHostsMap.entries()) {
      const hostCh = cfg.channels;
      const stateObj = {};
      if (!cfg.removed && hostCh > 0) {
        // 預設全部正常
        for (let ch = 1; ch <= hostCh; ch++) stateObj[ch] = 0;
        // 設定故障
        for (let ch of cfg.faultList) if (ch >= 1 && ch <= hostCh) stateObj[ch] = 1;
        // 設定異常 (不覆蓋故障)
        for (let ch of cfg.abnormalList) if (ch >= 1 && ch <= hostCh && stateObj[ch] !== 1) stateObj[ch] = 2;
      }
      newState[id] = stateObj;
    }
    
    // 替換全域
    HOSTS = newHosts;
    state = newState;
    saveFull();
    
    // 校正索引
    if (curIdx >= HOSTS.length) curIdx = 0;
    // 刷新介面
    refreshUIAfterImport();
    toast(`成功導入 ${HOSTS.length} 台主機，狀態已還原 (CH總數>0的主機自動恢復)`);
  }

  // 簡易 CSV 行解析 (處理引號)
  function parseCSVRow(line) {
    const result = [];
    let inQuote = false;
    let current = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { current += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        result.push(current);
        current = '';
      } else {
        current += ch;
      }
    }
    result.push(current);
    return result.map(s => s.trim());
  }

  // 匯出主機報表 (完全符合導入格式)
  function exportHostSheet() {
    const rows = [['主機', 'CH總數', '故障編號', '故障數', '正常總數', '備註']];
    for (const h of HOSTS) {
      if (h.removed) {
        rows.push([h.id, 0, '', 0, 0, '主機拆除']);
        continue;
      }
      const faultList = getFaultChannels(h.id);
      const abnormalList = getAbnormalChannels(h.id);
      const stats = hostStats(h);
      const normalCount = stats.normal;
      const remark = abnormalList.length ? `異常通道: ${abnormalList.join(',')}；待填寫原因` : '';
      rows.push([
        h.id, stats.total,
        faultList.join(','),
        faultList.length,
        normalCount,
        remark
      ]);
    }
    const totalCh = HOSTS.reduce((s,h)=>s+h.channels, 0);
    const totalFaultSum = rows.slice(1).reduce((s,r)=>s+(Number(r[3])||0), 0);
    const totalAbnormalCh = HOSTS.reduce((s,h)=>s+getAbnormalChannels(h.id).length, 0);
    rows.push(['全場總計', totalCh, '', totalFaultSum, totalCh-totalFaultSum-totalAbnormalCh, `異常總數:${totalAbnormalCh}`]);
    downloadCsv(rows, `CCTV點檢_主機報表_${dateStr()}.csv`);
    toast('已匯出主機報表 (可再次導入)');
  }

  function downloadCsv(rows, filename) {
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }
  function dateStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

  // 更新所有渲染
  function refreshUIAfterImport() {
    if (currentTab === 'inspection') renderInspection();
    else { renderOverview(); }
  }

  function renderHeader() { const d = new Date(); document.getElementById('headerDate').textContent = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} 週${['日','一','二','三','四','五','六'][d.getDay()]}`; }
  function renderInspection() { renderHostNav(); renderGrid(); const curHost = HOSTS[curIdx]; ['qaAllNormal','qaAllFault','qaAllAbnormal','btnResetCurrent'].forEach(id => document.getElementById(id).disabled = curHost?.removed); }
  function renderHostNav() {
    const h = HOSTS[curIdx]; if(!h) return;
    const st = hostStats(h);
    document.getElementById('hostName').textContent = h.id;
    document.getElementById('hostMeta').textContent = h.removed ? `已拆除 (無迴路)` : `${h.channels} 迴路　${curIdx+1} / ${HOSTS.length}`;
    document.getElementById('statNormal').textContent = st.normal;
    document.getElementById('statFault').textContent = st.fault;
    document.getElementById('statAbnormal').textContent = st.abnormal;
    const dotsEl = document.getElementById('hostDots');
    dotsEl.innerHTML = '';
    HOSTS.forEach((hh, i) => {
      const hs = hostStats(hh);
      const dot = document.createElement('div');
      dot.className = 'host-dot';
      if (hh.removed) dot.classList.add('removed');
      else if (i === curIdx) dot.classList.add('current');
      else if (hs.fault > 0) dot.classList.add('has-fault');
      else if (hs.abnormal > 0) dot.classList.add('has-abnormal');
      else dot.classList.add('all-ok');
      dot.title = hh.id + (hh.removed ? ' (已拆除)' : '');
      if (!hh.removed) dot.addEventListener('click', () => { haptic(); curIdx = i; renderInspection(); });
      dotsEl.appendChild(dot);
    });
  }
  function renderGrid() {
    const h = HOSTS[curIdx]; const grid = document.getElementById('chGrid'); grid.innerHTML = '';
    if (h.removed) { grid.innerHTML = '<div class="removed-message">🚧 此主機已拆除，無迴路資料 🚧</div>'; return; }
    const hs = state[h.id] || {};
    const filterMap = { fault:1, abnormal:2, normal:0, all:-1 };
    const filterVal = filterMap[curFilter];
    const gridContainer = document.createElement('div'); gridContainer.className = 'grid-normal';
    for (let ch=1; ch<=h.channels; ch++) {
      const v = hs[ch] !== undefined ? hs[ch] : 0;
      const card = document.createElement('div');
      card.className = 'ch-card'; card.dataset.state = v; card.dataset.ch = ch; card.textContent = ch;
      if (filterVal !== -1 && v !== filterVal) card.classList.add('hidden');
      card.addEventListener('click', () => {
        haptic(6);
        const next = (parseInt(card.dataset.state) + 1) % 3;
        card.dataset.state = next; hs[ch] = next; saveFull();
        updateStatsOnly(); updateDotsOnly();
        if (filterVal !== -1 && next !== filterVal) card.classList.add('hidden'); else card.classList.remove('hidden');
      });
      gridContainer.appendChild(card);
    }
    grid.appendChild(gridContainer);
  }
  function updateStatsOnly() { const st = hostStats(HOSTS[curIdx]); document.getElementById('statNormal').textContent = st.normal; document.getElementById('statFault').textContent = st.fault; document.getElementById('statAbnormal').textContent = st.abnormal; }
  function updateDotsOnly() { document.querySelectorAll('.host-dot').forEach((dot,i)=>{ if(i>=HOSTS.length) return; const hh=HOSTS[i], hs=hostStats(hh); dot.className='host-dot'; if(hh.removed) dot.classList.add('removed'); else if(i===curIdx) dot.classList.add('current'); else if(hs.fault>0) dot.classList.add('has-fault'); else if(hs.abnormal>0) dot.classList.add('has-abnormal'); else dot.classList.add('all-ok'); }); }

  function renderOverview() {
    let totalNormal=0, totalFault=0, totalAbnormal=0, totalCh=0;
    HOSTS.forEach(h=>{ const s=hostStats(h); totalNormal+=s.normal; totalFault+=s.fault; totalAbnormal+=s.abnormal; totalCh+=s.total; });
    document.getElementById('overviewSummary').innerHTML = `<div class="section-label">全場統計</div><div class="overview-summary-row"><span class="ov-stat"><div class="ov-dot" style="background:var(--normal)"></div>正常 ${totalNormal}</span><span class="ov-stat"><div class="ov-dot" style="background:var(--fault)"></div>故障 ${totalFault}</span><span class="ov-stat"><div class="ov-dot" style="background:var(--abnormal)"></div>異常 ${totalAbnormal}</span><span class="ov-stat">共 ${totalCh} 迴路</span></div><div style="height:8px;border-radius:4px;overflow:hidden;background:var(--border);display:flex;margin-top:12px"><div style="width:${totalCh?(totalNormal/totalCh*100).toFixed(1):0}%;background:var(--normal)"></div><div style="width:${totalCh?(totalFault/totalCh*100).toFixed(1):0}%;background:var(--fault)"></div><div style="width:${totalCh?(totalAbnormal/totalCh*100).toFixed(1):0}%;background:var(--abnormal)"></div></div>`;
    const grid = document.getElementById('overviewGrid'); grid.innerHTML = '';
    HOSTS.forEach((h,i)=>{ const s=hostStats(h); const card=document.createElement('div'); card.className='overview-card'; if(h.removed) card.classList.add('removed-card'); else if(s.fault>0||s.abnormal>0) card.classList.add('has-issue'); if(h.removed){ card.innerHTML=`<div class="ov-host-name">${h.id}</div><div class="removed-badge">🚧 已拆除</div><div class="ov-counts">迴路數:0</div>`; }else{ const np=(s.normal/s.total*100).toFixed(1), fp=(s.fault/s.total*100).toFixed(1), ap=(s.abnormal/s.total*100).toFixed(1); card.innerHTML=`<div class="ov-host-name">${h.id}</div><div class="ov-bar"><div style="width:${np}%;background:var(--normal)"></div><div style="width:${fp}%;background:var(--fault)"></div><div style="width:${ap}%;background:var(--abnormal)"></div></div><div class="ov-counts"><span><div class="ov-count-dot" style="background:var(--normal)"></div>${s.normal}</span><span><div class="ov-count-dot" style="background:var(--fault)"></div>${s.fault}</span><span><div class="ov-count-dot" style="background:var(--abnormal)"></div>${s.abnormal}</span><span>${s.total}CH</span></div>`; }
      card.addEventListener('click',()=>{ haptic(); curIdx=i; switchTab('inspection'); renderInspection(); }); grid.appendChild(card);
    });
  }

  function switchTab(tab) {
    currentTab = tab;
    const insp = document.getElementById('pane-inspection'), ov = document.getElementById('pane-overview');
    document.querySelectorAll('.tab').forEach((t,i)=>{ if(i===0 && tab==='inspection') t.classList.add('active'); else if(i===1 && tab==='overview') t.classList.add('active'); else t.classList.remove('active'); });
    if(tab==='inspection') { insp.style.display='block'; ov.style.display='none'; renderInspection(); } else { insp.style.display='none'; ov.style.display='block'; renderOverview(); }
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function setAllCurrent(val) { const h=HOSTS[curIdx]; if(h.removed){ toast('已拆除主機無法設定'); return; } for(let ch=1;ch<=h.channels;ch++) state[h.id][ch]=val; saveFull(); renderGrid(); updateStatsOnly(); updateDotsOnly(); toast(`${h.id} 已全設為${['正常','故障','異常'][val]}`); }

  // 導入按鈕 UI
  function setupImportButton() {
    const fileInput = document.createElement('input');
    fileInput.type = 'file'; fileInput.accept = '.csv'; fileInput.style.display = 'none';
    document.body.appendChild(fileInput);
    document.getElementById('btnImportReport').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => { try { importFromCSV(ev.target.result); } catch(err) { toast('導入失敗: '+err.message); } finally { fileInput.value = ''; } };
      reader.readAsText(file, 'UTF-8');
    });
  }

  // 事件綁定
  function bindEvents() {
    document.querySelectorAll('.filter-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ haptic(6); curFilter=btn.dataset.filter; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); const fv={fault:1,abnormal:2,normal:0,all:-1}[curFilter]; document.querySelectorAll('.ch-card').forEach(c=>{ if(fv===-1)c.classList.remove('hidden'); else if(parseInt(c.dataset.state)!==fv)c.classList.add('hidden'); else c.classList.remove('hidden'); }); }); });
    document.getElementById('btnPrev').addEventListener('click',()=>{ haptic(); curIdx=(curIdx-1+HOSTS.length)%HOSTS.length; renderInspection(); });
    document.getElementById('btnNext').addEventListener('click',()=>{ haptic(); curIdx=(curIdx+1)%HOSTS.length; renderInspection(); });
    document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{ haptic(6); switchTab(t.dataset.tab); }));
    document.getElementById('qaAllNormal').addEventListener('click',()=>setAllCurrent(0));
    document.getElementById('qaAllFault').addEventListener('click',()=>setAllCurrent(1));
    document.getElementById('qaAllAbnormal').addEventListener('click',()=>setAllCurrent(2));
    document.getElementById('btnResetCurrent').addEventListener('click',()=>{ if(HOSTS[curIdx].removed){ toast('拆除主機無法重置'); return; } if(confirm(`重置 ${HOSTS[curIdx].id} 為全部正常？`)){ haptic(); setAllCurrent(0); } });
    document.getElementById('btnResetAll').addEventListener('click',()=>{ if(confirm('⚠️ 清除所有點檢記錄，但保留主機清單？')){ haptic(); initStateFromHosts(); renderInspection(); if(currentTab==='overview') renderOverview(); toast('已重置所有主機狀態'); } });
    document.getElementById('btnExportFull').addEventListener('click',()=>exportHostSheet());
    // 手勢滑動
    let tsx=0,tsy=0,tActive=false; const gridEl=document.getElementById('chGrid');
    gridEl.addEventListener('touchstart',e=>{ if(e.touches.length===1){ tsx=e.touches[0].clientX; tsy=e.touches[0].clientY; tActive=true; } },{passive:true});
    gridEl.addEventListener('touchmove',e=>{ if(tActive&&e.touches.length===1){ const dx=e.touches[0].clientX-tsx, dy=Math.abs(e.touches[0].clientY-tsy); if(Math.abs(dx)>dy&&Math.abs(dx)>15)e.preventDefault(); }},{passive:false});
    gridEl.addEventListener('touchend',e=>{ if(!tActive)return; tActive=false; const dx=e.changedTouches[0].clientX-tsx; const dy=Math.abs(e.changedTouches[0].clientY-tsy); if(Math.abs(dx)>60&&dy<50){ haptic(); curIdx=dx<0?(curIdx+1)%HOSTS.length:(curIdx-1+HOSTS.length)%HOSTS.length; renderInspection(); } });
    document.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft'){ curIdx=(curIdx-1+HOSTS.length)%HOSTS.length; renderInspection(); } if(e.key==='ArrowRight'){ curIdx=(curIdx+1)%HOSTS.length; renderInspection(); } });
  }

  // 初始化
  function init() {
    loadFull();
    renderHeader();
    bindEvents();
    setupImportButton();
    switchTab('inspection');
    setInterval(renderHeader, 60000);
  }
  init();
</script>
</body>
</html>
